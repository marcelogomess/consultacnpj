apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cnpj-dev

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: cnpj-api
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler
      name: cnpj-api-hpa
  - patch: |-
      - op: replace
        path: /data/LOG_LEVEL
        value: "debug"
      - op: replace
        path: /data/LOG_FORMAT
        value: "text"
    target:
      kind: ConfigMap
      name: cnpj-api-config
