apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpj-import
  namespace: cnpj
  labels:
    app.kubernetes.io/name: cnpj-api
    app.kubernetes.io/component: import-job
spec:
  # Executa no dia 16 de cada mês às 02:00 (após o download do dia 15)
  schedule: "0 2 16 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cnpj-import
              image: cnpj-api:latest
              imagePullPolicy: Always
              command: ["node", "dist/scripts/run-import.js"]
              envFrom:
                - configMapRef:
                    name: cnpj-api-config
                - secretRef:
                    name: cnpj-api-secret
              resources:
                requests:
                  memory: "1Gi"
                  cpu: "500m"
                limits:
                  memory: "2Gi"
                  cpu: "1000m"
              volumeMounts:
                - name: downloads
                  mountPath: /data/downloads
          volumes:
            - name: downloads
              persistentVolumeClaim:
                claimName: cnpj-downloads-pvc
